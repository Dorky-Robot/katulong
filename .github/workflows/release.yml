name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create ${{ github.ref_name }} \
            --title "${{ github.ref_name }}" \
            --generate-notes

  update-tap:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get source archive SHA256
        run: |
          TAG="${GITHUB_REF_NAME}"
          URL="https://github.com/Dorky-Robot/katulong/archive/refs/tags/${TAG}.tar.gz"
          SHA=$(curl -fsSL "$URL" | sha256sum | cut -d' ' -f1)
          echo "SOURCE_SHA=${SHA}" >> "$GITHUB_ENV"

      - name: Checkout tap repo
        uses: actions/checkout@v4
        with:
          repository: dorky-robot/homebrew-tap
          token: ${{ secrets.TAP_GITHUB_TOKEN }}
          path: homebrew-tap

      - name: Update formula
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          TAG="${GITHUB_REF_NAME}"

          mkdir -p homebrew-tap/Formula
          cat > homebrew-tap/Formula/katulong.rb << FORMULA
          class Katulong < Formula
            desc "Self-hosted web terminal with tmux sessions and WebAuthn security"
            homepage "https://github.com/Dorky-Robot/katulong"
            url "https://github.com/Dorky-Robot/katulong/archive/refs/tags/${TAG}.tar.gz"
            sha256 "${SOURCE_SHA}"
            license "MIT"

            depends_on "node"

            def install
              system "npm", "install", "--omit=dev"
              libexec.install Dir["*"]
              bin.install_symlink libexec/"bin/katulong"
            end

            test do
              assert_match "katulong", shell_output("#{bin}/katulong --help")
            end
          end
          FORMULA

          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/katulong.rb
          git commit -m "katulong ${VERSION}"
          git push
