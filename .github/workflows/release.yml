name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create ${{ github.ref_name }} \
            --title "${{ github.ref_name }}" \
            --generate-notes

  update-tap:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get source archive SHA256
        run: |
          TAG="${GITHUB_REF_NAME}"
          URL="https://github.com/Dorky-Robot/katulong/archive/refs/tags/${TAG}.tar.gz"
          SHA=$(curl -fsSL "$URL" | sha256sum | cut -d' ' -f1)
          echo "SOURCE_SHA=${SHA}" >> "$GITHUB_ENV"

      - name: Checkout tap repo
        uses: actions/checkout@v4
        with:
          repository: dorky-robot/homebrew-tap
          token: ${{ secrets.TAP_GITHUB_TOKEN }}
          path: homebrew-tap

      - name: Update formula
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          TAG="${GITHUB_REF_NAME}"

          # Copy the formula from the repo (source of truth) and patch
          # in the correct version URL and SHA for this release.
          cp Formula/katulong.rb homebrew-tap/Formula/katulong.rb
          sed -i "s|url \".*\"|url \"https://github.com/Dorky-Robot/katulong/archive/refs/tags/${TAG}.tar.gz\"|" homebrew-tap/Formula/katulong.rb
          sed -i "s|sha256 \".*\"|sha256 \"${SOURCE_SHA}\"|" homebrew-tap/Formula/katulong.rb

          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/katulong.rb
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "katulong ${VERSION}"
          git push
