site_name: Katulong
site_url: https://dorkyrobot.com/katulong/
site_description: A secure, self-hosted web terminal with passwordless authentication.

repo_url: https://github.com/Dorky-Robot/katulong
repo_name: Dorky-Robot/katulong
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: slate
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.instant
    - navigation.sections
    - navigation.top
    - search.suggest
    - content.code.copy

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Features: features.md
  - CLI Reference: cli-reference.md
  - Security:
      - Overview: security/index.md
      - Improvements: security/improvements.md
  - Access Guide:
      - Overview: access-guide/index.md
      - Localhost: access-guide/localhost.md
      - LAN: access-guide/lan.md
      - Internet: access-guide/internet.md
      - Troubleshooting: access-guide/troubleshooting.md
  - Architecture: architecture.md
  - Use Cases: use-cases.md
  - Screenshots: screenshots.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Dorky-Robot/katulong
