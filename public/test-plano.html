<!DOCTYPE html>
<html>
<head><title>Plano Test</title></head>
<body style="background:#1a1a1a;color:#eee;font-family:monospace;padding:0;margin:0;">
<div id="tile-container" style="width:100%;height:100vh;"></div>
<script type="module">
import { createTileChrome } from "/lib/tile-chrome.js";

const params = new URLSearchParams(location.search);
const useChrome = params.get("chrome") === "1";

try {
  const mod = await import("/extensions/plano/tile.js");
  // Per SDK: setup(sdk, options) → TilePrototype directly
  const tile = mod.default(null, {});
  const container = document.getElementById("tile-container");

  if (useChrome) {
    // Simulate carousel chrome zones
    container.style.cssText = "width:100%;height:100vh;display:flex;flex-direction:column;overflow:hidden;";
    const { contentEl, chrome } = createTileChrome(container);
    await tile.mount(contentEl, {
      tileId: "test-plano",
      setTitle: (t) => { document.title = "Plano: " + t; },
      setIcon: () => {},
      sendWs: () => {},
      flip: () => {},
      chrome,
    });
  } else {
    // Standalone mode (no chrome)
    await tile.mount(container, {
      tileId: "test-plano",
      setTitle: (t) => { document.title = "Plano: " + t; },
      setIcon: () => {},
      sendWs: () => {},
      flip: () => {},
      chrome: {},
    });
  }

  // Expose tile for test access
  window.__planoTile = tile;
} catch (e) {
  document.getElementById("tile-container").innerHTML =
    `<div style="padding:20px;color:#f88;">Error: ${e.message}<br><pre>${e.stack}</pre></div>`;
}
</script>
</body>
</html>
